spring.application.name=backend

# Server
server.port=8080

# PostgreSQL DB config
spring.datasource.url=jdbc:postgresql://localhost:5432/backendDB
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


google.web.client.id=${GOOGLE_WEB_CLIENT_ID}
nextauth.secret=${NEXTAUTH_SECRET}

//mail gun
mailgun.api.key=${MAILGUNAPI}

mailgun.domain=${MAILGUNDOMAIN}

jwt.secret=${NEXTAUTH_SECRET}

google.client.id=YOUR_GOOGLE_CLIENT_ID
google.client.secret=YOUR_GOOGLE_CLIENT_SECRET
google.redirect.uri=http://localhost:8080/auth/google/callback
frontend.redirect.url=http://localhost:3000